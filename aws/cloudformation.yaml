AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CUB: Canine Understanding Buddy - single EC2 host (Amazon Linux 2023, Graviton)
  running server.py behind nginx, with SQLite on the persistent EBS root volume
  and a stable Elastic IP. Self-provisions from the public GitHub repo on boot.

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing EC2 key pair name for SSH access.
  InstanceType:
    Type: String
    Default: t4g.small
    AllowedValues: [t4g.micro, t4g.small, t4g.medium]
    Description: Graviton (arm64) instance type. t4g.micro is free-tier eligible in many regions.
  SshLocation:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed to SSH in. STRONGLY recommended to set this to <your-ip>/32.
  RepoUrl:
    Type: String
    Default: https://github.com/yjjrun/CUB.git
  Branch:
    Type: String
    Default: main
    Description: Git branch to deploy. Use 'main' once 1st-iteration is merged.
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64
    Description: Latest Amazon Linux 2023 arm64 AMI (resolved automatically).

Resources:
  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: CUB web (80/443) and SSH (22)
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SshLocation
          Description: SSH
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS

  WebInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      SecurityGroupIds: [!Ref WebSecurityGroup]
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            DeleteOnTermination: false   # keep the SQLite data if the instance is replaced
      Tags:
        - Key: Name
          Value: cub-buddy
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          dnf -y install git
          git clone --depth 1 --branch ${Branch} ${RepoUrl} /opt/cub
          CUB_REPO_URL=${RepoUrl} CUB_BRANCH=${Branch} bash /opt/cub/deploy/bootstrap.sh

  WebEip:
    Type: AWS::EC2::EIP
    Properties:
      InstanceId: !Ref WebInstance
      Domain: vpc

Outputs:
  PublicIp:
    Description: Elastic IP - create cub-buddy.com (and www) A records pointing here.
    Value: !Ref WebEip
  Url:
    Description: Test URL before DNS/TLS are set up.
    Value: !Sub "http://${WebEip}/"
  SshCommand:
    Description: SSH in (swap in your key file).
    Value: !Sub "ssh -i <your-key>.pem ec2-user@${WebEip}"
