# Render Blueprint for CUB: Canine Understanding Buddy.
# In the Render dashboard: New > Blueprint, connect the GitHub repo, and Render
# reads this file. The persistent disk keeps data/cub.sqlite across deploys.
services:
  - type: web
    name: cub-buddy
    runtime: docker
    plan: starter            # persistent disks require a paid instance (free tier is ephemeral)
    region: singapore        # product targets Singapore (HDB rules); pick the closest region
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: CUB_DATA_DIR
        value: /var/data
      - key: HOST
        value: 0.0.0.0
    disk:
      name: cub-data
      mountPath: /var/data
      sizeGB: 1
