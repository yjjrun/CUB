# Reverse proxy for CUB. certbot --nginx will add the TLS (443) server block
# and an HTTP->HTTPS redirect in place once DNS points at this host.
server {
    listen 80;
    listen [::]:80;
    server_name cub-buddy.com www.cub-buddy.com;

    # Uploaded/static assets and the SPA are all served by the Python app.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    client_max_body_size 5m;
}
