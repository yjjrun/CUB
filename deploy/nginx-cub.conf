# nginx serves the built React SPA from dist/ and proxies the JSON API to the
# Python app. certbot --nginx adds the TLS (443) server block + HTTP->HTTPS
# redirect once DNS points at this host.
server {
    listen 80;
    listen [::]:80;
    server_name cub-buddy.com www.cub-buddy.com;

    root /opt/cub/dist;
    index index.html;

    # JSON API -> Python app (systemd service on 127.0.0.1:8000).
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SPA: serve built assets, fall back to index.html for client routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 5m;
}
